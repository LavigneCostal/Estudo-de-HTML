<!DOCTYPE html>
<!-- Mostra para o sistema que a linguagem é HTML5 -->
<html lang="pt-br">
    <!-- Define o idioma do site -->
<head>
    <meta charset="UTF-8">
    <!--<meta> é uma teg de metadados, ou seja, informações sobre o site
    Charset é a codificação de caracteres, ou seja, o conjunto de caracteres que o site pode exibir.        
    O UTF-8 garante que seu site exiba corretamente acentos, símbolos e emojis -->
    <meta name="viewport" content="width=, initial-scale=1.0">
    <!-- Essa linha define sobre as dimensões da tela  -->
    <title>Site teste</title>
</head>
<!--<head> guarda as configurações invisíveis e metadados que dizem ao navegador e ao Google como o site deve funcionar e ser indexado-->
<body>
    <!-- <body> exibe os textos, imagens, botões, vídeos e links da sua página. -->

    <h1>Olá Mundo!</h1>


    <div> 
        <!-- <div> é uma teg que serve para colocar muitos elementos sob uma mesma regra -->
        <a href = "https://github.com/LavigneCostal" title="Github de LavigneCostal"> Conheça o meu Github</a>
        <!-- <a href> é uma teg de link --> 
        <!-- title é uma teg de descrição sob o elemento -->
        <img src = "fogo.png" alt = "Melhor que o Vasco" title = "Fogão  é muito melhor que o vasco bucha">
        <!-- alt é uma teg de descrição alternativa para a imagem -->
        <p>Este é um texto comum com uma palavra <span style="color: rgb(75, 8, 123); font-weight: bold;">importante</span> no meio.</p>
    </div>

</body>
</html>
